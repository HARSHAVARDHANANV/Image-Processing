<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Filter App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container">
        <h1>Basic Image Filter App</h1>

        <form id="uploadForm" class="upload-form">
            <label for="imageInput">Choose an image (jpg, jpeg, png)</label>
            <input id="imageInput" name="image" type="file" accept="image/png, image/jpeg" />
            <button type="submit">Upload Image</button>
        </form>

        <div id="message" class="message"></div>

        <div class="control-grid">
            <div class="slider-control">
                <label for="brightnessRange">Brightness: <span id="brightnessValue">0</span></label>
                <input id="brightnessRange" type="range" min="-100" max="100" value="0" />
            </div>
            <div class="slider-control">
                <label for="contrastRange">Contrast: <span id="contrastValue">1.0</span></label>
                <input id="contrastRange" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
            </div>
            <button id="applyAdjust" type="button" class="action-button" disabled>Apply</button>
        </div>

        <div class="preview-grid">
            <div class="preview-card">
                <h2>Original Image</h2>
                <img id="originalImage" src="#" alt="Original preview" class="preview-image" hidden />
            </div>
            <div class="preview-card">
                <h2>Processed Image</h2>
                <img id="processedImage" src="#" alt="Processed preview" class="preview-image" hidden />
            </div>
        </div>

        <div class="buttons-row">
            <button type="button" class="filter-button" data-filter="grayscale" disabled>Grayscale</button>
            <button type="button" class="filter-button" data-filter="edge" disabled>Edge Detection</button>
            <button type="button" class="filter-button" data-filter="blur" disabled>Gaussian Blur</button>
            <button type="button" class="filter-button" data-filter="flip" disabled>Horizontal Flip</button>
            <button type="button" class="filter-button" data-filter="threshold" disabled>Threshold</button>
            <button type="button" class="filter-button" data-filter="sharpen" disabled>Sharpen</button>
            <button type="button" class="filter-button" data-filter="sepia" disabled>Sepia</button>
        </div>

        <div class="action-row">
            <button id="resetButton" type="button" class="action-button reset-button" disabled>Reset Image</button>
            <button id="compareToggle" type="button" class="compare-button" disabled>Show Original</button>
        </div>

        <a id="downloadLink" class="download-link" href="#" download hidden>Download Processed Image</a>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const imageInput = document.getElementById('imageInput');
        const messageDiv = document.getElementById('message');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const filterButtons = document.querySelectorAll('.filter-button');
        const downloadLink = document.getElementById('downloadLink');
        const brightnessRange = document.getElementById('brightnessRange');
        const contrastRange = document.getElementById('contrastRange');
        const brightnessValue = document.getElementById('brightnessValue');
        const contrastValue = document.getElementById('contrastValue');
        const applyAdjust = document.getElementById('applyAdjust');
        const resetButton = document.getElementById('resetButton');
        const compareToggle = document.getElementById('compareToggle');

        let hasUploadedImage = false;
        let lastProcessedUrl = '';
        let compareMode = 'after';

        function showMessage(text, type = 'info') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function setButtonsEnabled(enabled) {
            filterButtons.forEach(button => {
                button.disabled = !enabled;
            });
            applyAdjust.disabled = !enabled;
            resetButton.disabled = !enabled;
            compareToggle.disabled = !enabled || !lastProcessedUrl;
        }

        function updateComparisonButton() {
            if (!lastProcessedUrl) {
                compareToggle.textContent = 'Show Original';
                compareToggle.disabled = true;
                return;
            }

            compareToggle.disabled = false;
            compareToggle.textContent = compareMode === 'after' ? 'Show Original' : 'Show Processed';
        }

        function showProcessedResult(data, operationName) {
            lastProcessedUrl = data.output_url + '?t=' + Date.now();
            processedImage.src = lastProcessedUrl;
            processedImage.hidden = false;
            downloadLink.href = data.output_url;
            downloadLink.download = data.output_filename;
            downloadLink.hidden = false;
            compareMode = 'after';
            updateComparisonButton();
            showMessage(`${operationName} applied successfully. You can download the result.`, 'success');
        }

        function enableUploadControls() {
            hasUploadedImage = true;
            setButtonsEnabled(true);
        }

        brightnessRange.addEventListener('input', () => {
            brightnessValue.textContent = brightnessRange.value;
        });

        contrastRange.addEventListener('input', () => {
            contrastValue.textContent = parseFloat(contrastRange.value).toFixed(1);
        });

        uploadForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const file = imageInput.files[0];
            if (!file) {
                showMessage('Please choose an image file first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData,
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Failed to upload image.', 'error');
                return;
            }

            originalImage.src = data.image_url;
            originalImage.hidden = false;
            processedImage.hidden = true;
            downloadLink.hidden = true;
            lastProcessedUrl = '';
            compareMode = 'after';
            enableUploadControls();
            updateComparisonButton();
            showMessage('Image uploaded. Choose a filter or adjust brightness/contrast.', 'success');
        });

        filterButtons.forEach((button) => {
            button.addEventListener('click', async () => {
                if (!hasUploadedImage) {
                    showMessage('Upload an image before applying a filter.', 'error');
                    return;
                }

                const filterName = button.getAttribute('data-filter');
                const response = await fetch(`/process/${filterName}`, {
                    method: 'POST',
                });

                const data = await response.json();
                if (!response.ok) {
                    showMessage(data.error || 'Failed to process image.', 'error');
                    return;
                }

                showProcessedResult(data, filterName.replace('_', ' '));
            });
        });

        applyAdjust.addEventListener('click', async () => {
            if (!hasUploadedImage) {
                showMessage('Upload an image before adjusting brightness and contrast.', 'error');
                return;
            }

            const response = await fetch('/adjust', {
                method: 'POST',
                body: new URLSearchParams({
                    brightness: brightnessRange.value,
                    contrast: contrastRange.value,
                }),
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Failed to adjust brightness/contrast.', 'error');
                return;
            }

            showProcessedResult(data, 'Brightness / Contrast');
        });

        resetButton.addEventListener('click', async () => {
            if (!hasUploadedImage) {
                showMessage('Upload an image before resetting.', 'error');
                return;
            }

            const response = await fetch('/reset', {
                method: 'POST',
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Failed to reset image.', 'error');
                return;
            }

            processedImage.hidden = true;
            downloadLink.hidden = true;
            lastProcessedUrl = '';
            compareMode = 'after';
            updateComparisonButton();
            showMessage('Image reset to original.', 'success');
        });

        compareToggle.addEventListener('click', () => {
            if (!lastProcessedUrl) {
                return;
            }

            compareMode = compareMode === 'after' ? 'before' : 'after';
            if (compareMode === 'before') {
                processedImage.src = originalImage.src;
            } else {
                processedImage.src = lastProcessedUrl;
            }
            updateComparisonButton();
        });
    </script>
</body>
</html>
